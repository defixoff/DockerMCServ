
services:
  minecraft:
    image: sapmachine:latest
    ports:
      - '25565:25565'
    volumes:
      - ./:/app
    container_name: minecraft
    command: sh -c 'cd /app; java -Xmx2048M -Xms1024M -jar server.jar nogui'
    stdin_open: true
    tty: true
  playit:
    image: ghcr.io/playit-cloud/playit-agent:0.17
    network_mode: host
    environment:
    - SECRET_KEY=0fb97ba7da40adda4923d208bc177417bce9fd276e1dc4c45939d9d81ce9e3c0
